name: Release

# GOTCHA: GitHub Actions silently skips this workflow when the head
# commit message contains the canonical CI-skip token (the bracketed
# phrase "skip" + "ci") ANYWHERE in the message — title or body,
# inside backticks, inside code blocks, doesn't matter. The
# semantic-release release commit emits that token by design (so its
# own commit doesn't loop a release back through CI). Side effect:
# any PR that DESCRIBES that release commit verbatim in its body
# inherits the token through the squash-merge and silently skips
# the next release.
#
# When writing a commit message or PR body that needs to reference
# the suppression behaviour, refer to it descriptively (e.g. "the
# semantic-release skip token") instead of pasting the literal.
#
# Recover with a no-op commit whose entire message — title and body
# — does NOT contain the literal token.
#
# References:
#  - https://docs.github.com/en/actions/managing-workflow-runs/skipping-workflow-runs

on:
  push:
    branches: [main, 7.x]
  # Manual escape hatch to verify what a release WOULD do — especially for the
  # 7.x line, which publishes 5 brand-new npm packages that have never been
  # published before. Run this from the Actions tab (pick the branch) before
  # trusting a real push-triggered release on 7.x for the first time.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — compute and log the release, but don't publish, tag, or open a GitHub release"
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      # main publishes the single legacy @decocms/start package (v*.*.* tags).
      # 7.x publishes the 5 split @decocms/* packages under an entirely
      # separate, non-colliding tag namespace (live-v*.*.*) and version
      # lineage — they're unrelated npm packages that happen to live in the
      # same repo, so they get their own semantic-release config rather than
      # sharing main's `branches` array (which would force 7.x's versions to
      # be "higher than main's last release", a constraint that makes no
      # sense across two different package sets). This swap is transient —
      # it edits the CI runner's checkout only, never committed back.
      - name: Select release config for this branch
        if: github.ref_name == '7.x'
        run: cp .releaserc.7x.json .releaserc.json

      - name: Release
        run: bunx semantic-release${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && ' --dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Caller workflows in storefront repos pin to a moveable major tag (`@v2`),
      # GitHub Actions convention. After every release we fast-forward that major
      # tag to the latest exact tag in the same series. Idempotent: if no new
      # release happened, this just re-points to the existing latest, which is a
      # no-op force-push. main-only: it walks v*.*.* tags specifically (the
      # legacy @decocms/start line); 7.x's live-v*.*.* tags don't match that
      # glob, so this has nothing to do there.
      #
      # Why not a separate workflow on `push: tags`? GitHub suppresses workflow
      # triggers caused by the auto-issued `GITHUB_TOKEN` (anti-recursion guard),
      # and `@semantic-release/git` pushes tags using exactly that token, so a
      # listener would never fire. Inlining keeps the lifecycle visible in one
      # job log.
      - name: Advance moveable major tag
        if: github.ref_name == 'main' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        run: |
          git fetch --tags --force
          # Filter out prerelease tags (-rc.N, -next.N, -beta.N, -alpha.N) — the
          # `v*.*.*` glob matches both `v5.3.0` and `v5.3.0-rc.2`, and we never
          # want the moveable major to land on a prerelease.
          LATEST=$(git tag -l 'v*.*.*' --sort=-v:refname | grep -vE '\-(rc|next|beta|alpha)\.' | head -n 1)
          if [ -z "$LATEST" ]; then
            echo "::notice::no stable v*.*.* tags yet; nothing to advance"
            exit 0
          fi
          MAJOR=$(echo "$LATEST" | sed -E 's/^(v[0-9]+).*/\1/')
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$LATEST"
          git push origin "$MAJOR" --force
          echo "::notice::Moved $MAJOR -> $LATEST"
